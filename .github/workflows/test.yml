name: test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: 1
          QT_QPA_PLATFORM: offscreen
          MPLBACKEND: Agg
