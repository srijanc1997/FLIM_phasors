name: docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt/OpenGL runtime (PySide6 autodoc on headless Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libdbus-1-3

      - name: Install package and Sphinx
        run: pip install -e ".[all,docs]"

      - name: Build HTML
        env:
          SPHINX_HTML_BASE_URL: https://srijanc1997.github.io/FLIM_phasors/
          QT_QPA_PLATFORM: offscreen
          MPLBACKEND: Agg
        run: python -m sphinx.cmd.build -b html docs docs/_build/html -W

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
